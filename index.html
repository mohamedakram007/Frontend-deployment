<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProductVault - Premium Dashboard</title>
  
  <!-- Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <!-- Navbar -->
  <header class="navbar">
    <div class="nav-brand">
      <div class="brand-logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
      </div>
      <h1 class="brand-name">ProductVault</h1>
    </div>
    <div class="nav-actions">
      <!-- Future nav actions could go here -->
    </div>
  </header>

  <!-- Main Dashboard Layout -->
  <main class="dashboard-container">
    
    <!-- Left Column: Add/Edit Product Form -->
    <aside class="sidebar-form">
      <div class="card form-card">
        <div class="card-header">
          <h2 id="formTitle">Add New Product</h2>
          <p class="subtitle">Enter the details of the product below.</p>
        </div>
        
        <form id="productForm">
          <input type="hidden" id="productId" />
          
          <div class="input-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" placeholder="e.g. Wireless Headphones" required autocomplete="off" />
          </div>

          <div class="input-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4" placeholder="Brief details about the product..." required></textarea>
          </div>

          <div class="form-row">
            <div class="input-group">
              <label for="price">Price ($)</label>
              <input type="number" id="price" step="0.01" min="0" placeholder="0.00" required />
            </div>

            <div class="input-group">
              <label for="quantity">Quantity</label>
              <input type="number" id="quantity" min="0" placeholder="0" required />
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="submitBtn">
              <span class="btn-text">Add Product</span>
              <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <button type="button" class="btn btn-secondary hidden" id="cancelBtn">Cancel</button>
          </div>
        </form>
      </div>
    </aside>

    <!-- Right Column: Products List -->
    <section class="main-content">
      <div class="content-header">
        <div class="title-group">
          <h2>Inventory</h2>
          <span class="badge" id="productCount">0 Items</span>
        </div>
        <button class="btn btn-icon-only" id="refreshBtn" title="Refresh List">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
        </button>
      </div>

      <!-- State Containers -->
      <div id="loader" class="state-container hidden">
        <div class="spinner"></div>
        <p>Loading your inventory...</p>
      </div>

      <div id="emptyState" class="state-container hidden">
        <div class="empty-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="12" x2="2" y2="12"></line><path d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"></path><line x1="6" y1="16" x2="6.01" y2="16"></line><line x1="10" y1="16" x2="10.01" y2="16"></line></svg>
        </div>
        <h3>No Products Found</h3>
        <p>Your inventory is empty. Add a product to get started.</p>
      </div>

      <!-- Products Grid -->
      <div id="productList" class="products-grid">
        <!-- Product Cards will be injected here via JS -->
      </div>
    </section>
  </main>

  <!-- Toast Notification Container -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- JS -->
  <script src="script.js"></script>
</body>
</html>
